name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          bun: "true"
          playwright: "true"

      - name: Build
        run: pnpm run build

      - name: Check (lint + type check)
        run: pnpm run check

      - name: Test
        run: pnpm run test

  build:
    needs: [checks]
    strategy:
      matrix:
        include:
          - target: bun-darwin-x64
            os: darwin
            arch: amd64
            runner: macos-15-intel
          - target: bun-darwin-arm64
            os: darwin
            arch: arm64
            runner: macos-15
          - target: bun-linux-x64
            os: linux
            arch: amd64
            runner: ubuntu-latest
          - target: bun-linux-arm64
            os: linux
            arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          bun: "true"

      - name: Set version from tag
        run: node scripts/set-version.js "$GITHUB_REF_NAME"

      - name: Build binary
        run: pnpm run build:binary

      - name: Verify binary architecture
        run: |
          file dist/bin/kimchi
          case "${{ matrix.arch }}" in
            amd64) file dist/bin/kimchi | grep -Eq 'x86[_-]64|x86-64' ;;
            arm64) file dist/bin/kimchi | grep -Eq 'arm64|aarch64' ;;
            *) echo "Unsupported arch: ${{ matrix.arch }}" >&2; exit 1 ;;
          esac

      - name: Package binary
        run: tar -czf kimchi_${{ matrix.os }}_${{ matrix.arch }}.tar.gz -C dist bin share

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kimchi_${{ matrix.os }}_${{ matrix.arch }}
          path: kimchi_${{ matrix.os }}_${{ matrix.arch }}.tar.gz

  smoke-test:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          bun: "true"

      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: kimchi_linux_amd64

      - name: Extract binary into dist/
        run: |
          mkdir -p dist
          tar -xzf kimchi_linux_amd64.tar.gz -C dist

      - name: Smoke tests
        run: pnpm run test:smoke

  release:
    needs: [smoke-test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum kimchi_*.tar.gz > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            artifacts/kimchi_*.tar.gz
            artifacts/checksums.txt
            scripts/install.sh
          generate_release_notes: true

  homebrew:
    needs: [release]
    if: ${{ !contains(github.ref_name, '.rc.') }}
    runs-on: ubuntu-latest

    steps:
      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: kimchi_darwin_amd64
          path: artifacts

      - name: Download remaining artifacts
        uses: actions/download-artifact@v4
        with:
          name: kimchi_darwin_arm64
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: kimchi_linux_amd64
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: kimchi_linux_arm64
          path: artifacts

      - name: Compute SHA256 values
        id: sha
        run: |
          echo "darwin_amd64=$(sha256sum artifacts/kimchi_darwin_amd64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "darwin_arm64=$(sha256sum artifacts/kimchi_darwin_arm64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(sha256sum artifacts/kimchi_linux_amd64.tar.gz  | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum artifacts/kimchi_linux_arm64.tar.gz  | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: castai/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Formula/kimchi.rb
        env:
          VERSION: ${{ github.ref_name }}
          SHA_DARWIN_AMD64: ${{ steps.sha.outputs.darwin_amd64 }}
          SHA_DARWIN_ARM64: ${{ steps.sha.outputs.darwin_arm64 }}
          SHA_LINUX_AMD64: ${{ steps.sha.outputs.linux_amd64 }}
          SHA_LINUX_ARM64: ${{ steps.sha.outputs.linux_arm64 }}
        run: |
          FORMULA=homebrew-tap/Formula/kimchi.rb
          # Strip leading 'v' from tag (e.g. v1.2.3 → 1.2.3)
          VER="${VERSION#v}"

          sed -i \
            -e "s/^  version \".*\"/  version \"${VER}\"/" \
            -e "/kimchi_darwin_arm64/{n; s/sha256 \".*\"/sha256 \"${SHA_DARWIN_ARM64}\"/}" \
            -e "/kimchi_darwin_amd64/{n; s/sha256 \".*\"/sha256 \"${SHA_DARWIN_AMD64}\"/}" \
            -e "/kimchi_linux_arm64/{n; s/sha256 \".*\"/sha256 \"${SHA_LINUX_ARM64}\"/}" \
            -e "/kimchi_linux_amd64/{n; s/sha256 \".*\"/sha256 \"${SHA_LINUX_AMD64}\"/}" \
            "$FORMULA"

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kimchi.rb
          git commit -m "kimchi ${GITHUB_REF_NAME}"
          git push
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
